<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Catalog | Street-Preppy Fusion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* The "Lookbook" Polish - Hover Effects */
        .product-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1) !important;
        }
    </style>
</head>
<body class="bg-white">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">RAYMOND C&nbsp;LAM</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Portfolio</a></li>
                    <li class="nav-item"><a class="nav-link active" href="catalog.html">Brand Catalog</a></li>
                    <li class="nav-item ms-lg-3">
                        <a class="btn btn-primary text-white px-4" href="index.html#contact">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h1 class="display-4 fw-bold mb-5">Season 1: Foundations</h1>
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card border-0 shadow-sm product-card h-100">
                    <div style="height: 300px; background: #f8f9fa;" class="d-flex align-items-center justify-content-center text-muted">
                        <img src="https://via.placeholder.com/300x400?text=Hoodie+Placeholder" alt="Signature Essential Hoodie in Slate Grey" class="img-fluid">
                    </div>
                    <div class="card-body">
                        <h5 class="fw-bold">Heavyweight Hoodie</h5>
                        <p class="text-muted small">Available in Sand, Slate, and Charcoal</p>
                        <p class="fw-bold">$125.00</p>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4 mb-4">
                <div class="card border-0 shadow-sm product-card h-100">
                    <div style="height: 300px; background: #f8f9fa;" class="d-flex align-items-center justify-content-center text-muted">
                        <img src="https://via.placeholder.com/300x400?text=Chino+Placeholder" alt="Varsity Tech Chino in Navy" class="img-fluid">
                    </div>
                    <div class="card-body">
                        <h5 class="fw-bold">Varsity Tech Chino</h5>
                        <p class="text-muted small">Performance fabric with tailored fit</p>
                        <p class="fw-bold">$110.00</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
