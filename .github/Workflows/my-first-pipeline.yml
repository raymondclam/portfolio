name: My First Python Pipeline

# This tells GitHub: "Run this whenever I push new code"
on: [push]

jobs:
  check-my-code:
    # This is the "Virtual Computer" the robot will use
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get a copy of your code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Step 3: A simple test to prove it works
      - name: Run a test command
        run: |
          echo "Hello! Your pipeline is officially working."
          python --version