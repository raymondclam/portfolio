name: HTML Quality & Data Analysis

on: [push]

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    # This is the new part! The robot will run your script
    - name: Run Site Analytics
      run: python analyze_site.py
