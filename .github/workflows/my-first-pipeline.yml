name: My First Python Pipeline

# This tells the robot to run every time you "push" code to GitHub
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. This step "checks out" your code so the robot can see it
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. This step sets up Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    # 3. This is the "Hello World" of pipelines!
    - name: Run a message
      run: |
        print("Hello, Raymond! Your Python pipeline is running successfully.")
      shell: python
