<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Raymond Lam Portfolio</title>
  <style>
    body {
      background-color: white;
      color: black;
      transition: 0.5s;
      font-family: sans-serif;
      padding: 50px;
    }
    .dark-mode {
      background-color: #121212;
      color: white;
    }
    button {
      font-size: 24px;
      background: none;
      border: 2px solid;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      cursor: pointer;
    }
    .contact-link {
      display: inline-block;
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
    }
    .contact-link:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>  
  <button id="theme-btn" onclick="toggleDarkMode()">☀️</button>

  <h1>Hi, I'm Raymond Lam</h1>
  <p>I am learning to build cool things with AI and code.</p>

  <hr> 
  
  <h2>Get In Touch</h2>
  <p>I am looking for new opportunities! Feel free to reach out:</p>
  <a href="mailto:raymondc.lam@gmail.com" class="contact-link">📧 Email Me</a>

  <script>
    function toggleDarkMode() {
      document.body.classList.toggle("dark-mode");
      const btn = document.getElementById("theme-btn");
      if (document.body.classList.contains("dark-mode")) {
        btn.innerHTML = "🌙";
      } else {
        btn.innerHTML = "☀️";
      }
    }
  </script>
</body>
</html>
