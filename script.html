<!DOCTYPE html>
<html>
<head>
    <title>Northwest - Script Room</title>
    <style>
        /* This makes it look like a professional script */
        body {
            background-color: #f4f4f9; /* Soft grey background */
            font-family: 'Courier Prime', 'Courier New', Courier, monospace;
            padding: 50px;
            color: #333;
        }
        .script-container {
            background: white;
            max-width: 800px;
            margin: 0 auto;
            padding: 60px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 5px solid #005a9c; /* Seattle Blue accent */
            min-height: 100vh;
        }
        pre {
            white-space: pre-wrap; /* Keeps lines from running off the page */
            font-size: 16px;
            line-height: 1.5;
        }
        h1 {
            text-align: center;
            font-family: sans-serif;
            color: #005a9c;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="script-container">
        <h1>NORTHWEST</h1>
        <hr>
        <pre id="script-content">Loading the soul of Seattle...</pre>
    </div>

    <script>
      fetch('northwest_script.txt')
        .then(response => response.text())
        .then(data => {
          document.getElementById('script-content').textContent = data;
        });
    </script>
    
</body>
</html>
